name: CI — Build and Validate

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate Python syntax
        run: |
          python -m py_compile main.py worker.py ai_analyzer.py
          python -m py_compile dags/cgu_analysis_dag.py
          echo "Python syntax OK"

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile
          push: false
          tags: 2long2read-api:latest

      - name: Build Worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.worker
          push: false
          tags: 2long2read-worker:latest

      - name: Summary
        run: |
          echo "Build OK: 2long2read-api:latest, 2long2read-worker:latest"
