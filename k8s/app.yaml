apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
      - name: worker
        image: 2long2read-worker:latest
        imagePullPolicy: Never
        env:
          - name: MONGO_HOSTNAME
            value: "mongo-service"
          - name: ANTHROPIC_API_KEY
            valueFrom:
              secretKeyRef:
                name: claude-api-key-secret
                key: ANTHROPIC_API_KEY
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
      - name: api
        image: 2long2read-api:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8000
        env:
          - name: MONGO_HOSTNAME
            value: "mongo-service"
          - name: ANTHROPIC_API_KEY
            valueFrom:
              secretKeyRef:
                name: claude-api-key-secret
                key: ANTHROPIC_API_KEY
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: api-service
  labels:
    app: api
  annotations:
    prometheus.io/scrape: 'true'
    prometheus.io/port: '8000'
    prometheus.io/path: '/metrics'
spec:
  type: LoadBalancer
  selector:
    app: api
  ports:
    - name: http
      protocol: TCP
      port: 8000
      targetPort: 8000
