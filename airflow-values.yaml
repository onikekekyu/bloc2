# Airflow 2.10.3 — Configuration pour 2Long2Read
# KubernetesExecutor : chaque task Airflow lance un pod dédié

defaultAirflowTag: "2.10.3"
airflowVersion: "2.10.3"

executor: KubernetesExecutor

# Base de données PostgreSQL intégrée
postgresql:
  enabled: true
  image:
    tag: "15"

# Interface web
webserver:
  defaultUser:
    enabled: true
    role: Admin
    username: admin
    password: admin
    email: admin@example.com

# DAGs via Persistent Volume (dossier local monté)
dags:
  gitSync:
    enabled: false
  persistence:
    enabled: true
    existingClaim: airflow-dags-pvc

# Logs dans un volume persistant
logs:
  persistence:
    enabled: true
    size: 1Gi
